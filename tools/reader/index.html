<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TagDrop Reader</title>
<script>
  // crypto.subtle (SHA-256, AES-GCM) requires a secure context. GitHub Pages
  // serves this page over both http:// and https:// without redirecting —
  // upgrade to https so crypto.subtle is available.
  if (location.protocol === 'http:' && !['localhost', '127.0.0.1'].includes(location.hostname)) {
    location.replace('https:' + location.href.slice(location.protocol.length));

</script>
<!--
  TagDrop Reader — scan TagDrop QR codes in any modern browser.
  Self-contained single HTML file, no server required.

  QR decoding uses jsQR (CDN). For fully offline use, download
  https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js and change the
  script src below to a relative path.

  Rendering text/markdown content dynamically imports marked (CDN) on
  first use; if that fails (e.g. offline), it falls back to plain text.
-->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f5; color: #222; }

header { background: #1a1a2e; color: #fff; padding: 14px 20px;
         display: flex; align-items: center; justify-content: space-between; }
header h1 { margin: 0; font-size: 1.2rem; }

button.primary { padding: 10px 22px; background: #1a1a2e; color: #fff;
                 border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
button.primary:hover { background: #2a2a4e; }
button.primary.big { padding: 16px 36px; font-size: 1.1rem; border-radius: 12px; }
button.secondary { padding: 7px 14px; background: #fff; border: 1px solid #ccc;
                   border-radius: 6px; cursor: pointer; font-size: 0.88rem; }
button.secondary:hover { background: #f0f0f0; }
button.ghost { background: none; border: 1px solid rgba(255,255,255,0.3); color: #fff;
               padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
button.ghost:disabled { opacity: 0.35; cursor: default; }

/* Scanner overlay */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85);
           display: flex; align-items: center; justify-content: center; z-index: 100; }
.overlay.hidden { display: none; }
.scan-box { display: flex; flex-direction: column; align-items: center; gap: 12px;
            padding: 16px; color: #fff; width: min(480px, 96vw); }
.scan-box video { width: 100%; max-height: 50vh; object-fit: cover;
                  border-radius: 8px; background: #000; }
#scanStatus { font-size: 0.9rem; color: #ccc; text-align: center; margin: 0; }

/* Main content */
main { max-width: 720px; margin: 0 auto; padding: 20px 16px; }

#scanSection { text-align: center; padding: 24px 0; }
#scanSection p { color: #666; font-size: 0.9rem; margin-top: 10px; }

.img-dropzone {
  margin: 16px auto 0; max-width: 360px; border: 2px dashed #ccc; border-radius: 8px;
  padding: 14px; font-size: 0.85rem; color: #888; cursor: pointer;
  transition: border-color .15s, background-color .15s;
}
.img-dropzone.dragover { border-color: #1a1a2e; background: #f0f0ff; color: #1a1a2e; }
.img-dropzone label { cursor: pointer; display: block; }

/* Message bar */
#msgBar { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px;
          font-size: 0.9rem; }
#msgBar.ok   { background: #d4edda; color: #155724; }
#msgBar.err  { background: #f8d7da; color: #721c24; }
#msgBar.warn { background: #fff3cd; color: #856404; }
#msgBar.info { background: #d1ecf1; color: #0c5460; }
#msgBar.hidden { display: none; }

/* Assembly progress */
#assemblyBar { background: #e8f4fd; border: 1px solid #bee5f9; border-radius: 6px;
               padding: 10px 14px; display: flex; align-items: center;
               justify-content: space-between; gap: 12px; margin-bottom: 12px; }
#assemblyBar.hidden { display: none; }
#assemblyText { font-size: 0.9rem; color: #0c5460; }

/* Paper directory */
#paperSection { background: #fff; border-radius: 10px; padding: 16px;
                box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
#paperSection.hidden { display: none; }
#paperHeader { font-size: 1rem; margin-bottom: 12px; display: flex;
               align-items: baseline; gap: 8px; flex-wrap: wrap; }
.chip { background: #e9ecef; padding: 2px 8px; border-radius: 12px;
        font-size: 0.78rem; color: #555; }

#fileList { list-style: none; margin: 0; padding: 0; }
.file-item { display: flex; align-items: center; gap: 8px; padding: 8px 0;
             border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
.file-item:last-child { border-bottom: none; }
.file-item .slug { font-family: monospace; font-size: 0.88rem; flex: 1; min-width: 0;
                   overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .mime { font-size: 0.75rem; color: #888; white-space: nowrap; }
.file-item.have .slug { color: #155724; }
.file-item.missing .slug { color: #999; }
.missing-label { font-size: 0.75rem; color: #aaa; font-style: italic; }

.paper-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }

/* CBOR debug dialog */
.cbor-box { background: #fff; border-radius: 10px; padding: 16px;
            width: min(640px, 96vw); max-height: 80vh;
            display: flex; flex-direction: column; gap: 12px; }
.cbor-box h2 { margin: 0; font-size: 0.95rem; font-family: monospace;
               color: #333; word-break: break-all; }
#cborDump { margin: 0; overflow: auto; font-size: 0.78rem; line-height: 1.4;
            white-space: pre-wrap; word-break: break-all;
            background: #f5f5f5; border-radius: 6px; padding: 12px; flex: 1; }

/* Content viewer */
#contentSection { background: #fff; border-radius: 10px;
                  box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; }
#contentSection.hidden { display: none; }
#contentHeader { display: flex; align-items: center; justify-content: space-between;
                 padding: 12px 16px; border-bottom: 1px solid #eee; gap: 12px; }
#contentTitle { font-size: 0.9rem; font-family: monospace; color: #555;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#contentArea { min-height: 200px; }
#contentArea pre { margin: 0; }

/* Passphrase dialog */
.passphrase-box {
  background: #2a2a3e; border-radius: 12px; padding: 24px;
  width: min(400px, 96vw); display: flex; flex-direction: column; gap: 10px; color: #fff;
}

.passphrase-box p { margin: 0; font-size: 0.88rem; color: #aaa; }

}
#passphraseError { font-size: 0.82rem; color: #f88; min-height: 1.2em; }
.passphrase-box label { font-size: 0.85rem; color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.passphrase-box .btn-row { display: flex; gap: 8px; margin-top: 6px; }

<main>

<script>
'use strict';

// ── Base45 decoder ────────────────────────────────────────────────────────
const B45 = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
function base45Decode(s) {
  if (s.length % 3 === 1) throw new Error('Invalid Base45 length');
  const out = [];
  let i = 0;
  while (i + 2 < s.length) {
    const c0 = B45.indexOf(s[i]), c1 = B45.indexOf(s[i+1]), c2 = B45.indexOf(s[i+2]);
    if (c0 < 0 || c1 < 0 || c2 < 0) throw new Error('Invalid Base45 char');
    const n = c0 + c1 * 45 + c2 * 2025;
    if (n > 0xFFFF) throw new Error('Base45 value overflow');
    out.push((n >> 8) & 0xFF, n & 0xFF);
    i += 3;
  }
  if (i < s.length) {
    const c0 = B45.indexOf(s[i]), c1 = B45.indexOf(s[i+1]);
    if (c0 < 0 || c1 < 0) throw new Error('Invalid Base45 char');
    out.push(c0 + c1 * 45);
  }
  return new Uint8Array(out);
}

// ── CBOR decoder ──────────────────────────────────────────────────────────
// Decodes exactly `n` top-level data items from a CBOR Sequence (RFC 8742),
// returning { items, trailing } — `trailing` is whatever bytes remain after
// those `n` items. Used for the version/type/payload envelope (SPEC §2): a
// Single's hidden override-map blob (SPEC §9) lives in the trailing bytes
// after its 3-item sequence. Decoders MUST NOT treat trailing bytes as an error.
function cborDecodeSequencePrefix(bytes, n) {
  let pos = 0;
  function rb() {
    if (pos >= bytes.length) throw new Error('Unexpected end of CBOR');
    return bytes[pos++];
  }
  function rbs(m) {
    if (pos + m > bytes.length) throw new Error('Truncated CBOR');
    const slice = bytes.slice(pos, pos + m); pos += m; return slice;
  }
  function readArg(info) {
    if (info <= 23) return info;
    if (info === 24) return rb();
    if (info === 25) { return rb() * 256 + rb(); }
    if (info === 26) { let n2 = 0; for (let i = 0; i < 4; i++) n2 = n2 * 256 + rb(); return n2; }
    if (info === 27) { return rbs(8); } // float64: 8 raw bytes, decoded in readVal
    throw new Error('Unsupported CBOR additional info: ' + info);
  }
  function readVal() {
    const b = rb(), major = b >> 5, a = readArg(b & 0x1F);
    switch (major) {
      case 0: return a;
      case 2: return rbs(a);
      case 3: return new TextDecoder().decode(rbs(a));
      case 4: return Array.from({length: a}, readVal);
      case 5: {
        const m = {};
        for (let i = 0; i < a; i++) { const k = readVal(); m[k] = readVal(); }
        return m;
      }
      case 7:
        if (b === 0xF6) return null;
        if (b === 0xF4) return false;
        if (b === 0xF5) return true;
        if ((b & 0x1F) === 27) return new DataView(a.buffer, a.byteOffset, 8).getFloat64(0);
        throw new Error('Unsupported CBOR simple value: 0x' + b.toString(16));
      default: throw new Error('Unsupported CBOR major type: ' + major);
    }
  }
  const items = [];
  for (let i = 0; i < n; i++) items.push(readVal());
  return { items, trailing: bytes.slice(pos) };
}

// ── Decompression ─────────────────────────────────────────────────────────
async function zlibDecompress(bytes) {
  const ds = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  // Don't await write()/close() here — DecompressionStream's writable side has
  // backpressure (highWaterMark 1), so they won't resolve until the readable
  // side below is read. Fire-and-forget (swallow errors here; a malformed
  // stream surfaces via the reader.read() rejection below instead).
  writer.write(bytes).catch(() => {});
  writer.close().catch(() => {});
  const chunks = [];
  const reader = ds.readable.getReader();
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

// ── Encryption (SPEC §9) ──────────────────────────────────────────────────
// AES-256-GCM decrypt; returns null on authentication failure (wrong key/nonce).
async function decryptAesGcm(ciphertextAndTag, key, nonce) {
  try {
    const cryptoKey = await crypto.subtle.importKey('raw', key, 'AES-GCM', false, ['decrypt']);
    return new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv: nonce }, cryptoKey, ciphertextAndTag));
  } catch (e) {
    return null;
  }
}

// PBKDF2-SHA256 key derivation (SPEC §9 passphrase mode). Returns 32 raw AES-256-GCM key bytes.
async function deriveKeyFromPassphrase(passphrase, salt, iters) {
  const base = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']
  );
  const aesKey = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: iters, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, true, ['decrypt']
  );
  return new Uint8Array(await crypto.subtle.exportKey('raw', aesKey));
}

// Session-level cache: saltHex → derived AES key bytes. Cleared on page reload.
// Lets the reader unlock passphrase-protected QRs in the same session without re-prompting.
const sessionPassphraseKeys = new Map();

// Passphrase dialog — returns { passphrase, sessionOnly, store } or null on cancel.
function askPassphrase(infoText) {
  return new Promise(resolve => {
    document.getElementById('passphraseInfo').textContent = infoText;
    document.getElementById('passphraseInput').value = '';
    document.getElementById('passphraseError').textContent = '';
    document.getElementById('passphraseOverlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('passphraseInput').focus(), 50);

    const ok     = document.getElementById('btnPassphraseOk');
    const cancel = document.getElementById('btnPassphraseCancel');

    function cleanup() {
      document.getElementById('passphraseOverlay').classList.add('hidden');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      document.getElementById('passphraseInput').removeEventListener('keydown', onKey);
    }
    function onOk() {
      const p = document.getElementById('passphraseInput').value;
      if (!p) { document.getElementById('passphraseError').textContent = 'Enter a passphrase.'; return; }
      cleanup();
      resolve({
        passphrase:  p,
        sessionOnly: document.getElementById('passphraseSession').checked,
        store:       document.getElementById('passphraseStore').checked,
      });
    }
    function onCancel() { cleanup(); resolve(null); }
    function onKey(e) { if (e.key === 'Enter') onOk(); else if (e.key === 'Escape') onCancel(); }

    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
    document.getElementById('passphraseInput').addEventListener('keydown', onKey);
  });
}

// Minimum size of a self-contained nonce(12) || ciphertext || tag(16) override-map blob (SPEC §9).
const OVERRIDE_BLOB_MIN_BYTES = 28;

/**
 * Tries `key` against `blob` as nonce(12) || ciphertext || tag(16) (SPEC §9). Returns the
 * decoded override map ({hint, mimeType, content, filename}, each possibly null) on
 * success, or null if `blob` is too short, `key` doesn't authenticate it, or the
 * plaintext doesn't decode as a CBOR map — any of which just means this candidate
 * doesn't apply here ("discovery, not declaration").
 */
async function tryDecryptOverrideMap(blob, key, compression) {
  if (blob.length < OVERRIDE_BLOB_MIN_BYTES) return null;
  const nonce = blob.slice(0, 12);
  const ciphertextAndTag = blob.slice(12);
  const plaintext = await decryptAesGcm(ciphertextAndTag, key, nonce);
  if (plaintext === null) return null;
  let cbor = plaintext;
  if (compression === 1) {
    try { cbor = await zlibDecompress(plaintext); } catch (e) { return null; }
  }
  let map;
  try {
    const decoded = cborDecodeSequencePrefix(cbor, 1).items[0];
    if (!decoded || typeof decoded !== 'object' || decoded instanceof Uint8Array || Array.isArray(decoded)) return null;
    map = decoded;
  } catch (e) { return null; }
  return {
    hint:     map[K.HINT] ?? null,
    mimeType: map[K.MIME] ?? null,
    content:  map[K.CONTENT] ?? null,
    filename: map[K.FILENAME] ?? null,
  };
}

/**
 * Merges a decrypted override map onto a clear map's fields (SPEC §9): the override's
 * present fields win. `fallbackContent` supplies `content` when the override doesn't
 * specify one — empty for "fresh resolution" (a Single/Manifest reached for the first
 * time), or the existing cached/cover content for "self-correct" of an already-cached item.
 */
function mergeOverride(clear, override, fallbackContent) {
  return {
    hint:     override.hint     ?? clear.hint     ?? null,
    mimeType: override.mimeType ?? clear.mimeType,
    filename: override.filename ?? clear.filename ?? null,
    content:  override.content  ?? fallbackContent,
  };
}

// ── Utilities ─────────────────────────────────────────────────────────────
function toHex(u8) {
  return Array.from(u8).map(b => b.toString(16).padStart(2, '0')).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── CBOR payload-map keys (key 1 "version" is retired — it lives in the envelope) ──
const K = {
  CACHE_ID:2, HINT:3, MIME:4, CONTENT:5,
  CHUNK_COUNT:6, TOTAL_BYTES:7, SHA256:8, CHUNK_IDX:9, CHUNK_DATA:10,
  FILENAME:11, COMPRESSION:12,
  SET:13, SLUG:14, FILES:15, RELATED:16,
  FILE_SLUG:20, FILE_MIME:21, FILE_ID:22, PAPER_ID:23,
  LAT:26, LNG:27,
  ENCRYPTION:28, KEY_MATERIAL:30, RETAIN_KEY:31,
  KDF_ALG:37, KDF_SALT:38, KDF_ITERS:39
};

// CBOR-sequence envelope (SPEC §2): tagdrop:<base45( CBOR(version) || CBOR(type) || CBOR(payload) )>
const ENVELOPE_VERSION = 1;
const TYPE_SINGLE = 0, TYPE_MANIFEST = 1, TYPE_CHUNK = 2, TYPE_PAPER_MANIFEST = 3;

// ── CBOR debug ────────────────────────────────────────────────────────────
// Mirrors TagDropCodec.describeCbor/describeMap (Kotlin) for the "View raw CBOR"
// debug view: hex dump, version/type envelope, key-by-key payload breakdown.
const TYPE_NAMES = { 0: 'Single', 1: 'Manifest', 2: 'Chunk', 3: 'PaperManifest' };
const KEY_NAMES = {
  2: 'cache_id/root_hash', 3: 'hint/label', 4: 'mime_type', 5: 'content',
  6: 'chunk_count', 7: 'total_bytes', 8: 'sha256', 9: 'chunk_index', 10: 'chunk_data',
  11: 'filename', 12: 'compression', 13: 'set', 14: 'slug', 15: 'files', 16: 'related',
  17: 'collection_id', 18: 'collection_label', 19: 'collection_tag',
  20: 'slug', 21: 'mime_type', 22: 'file_id', 23: 'paper_id', 24: 'icon',
  26: 'lat', 27: 'lng',
  28: 'encryption', 30: 'key_material', 31: 'retain_key',
  37: 'kdf_alg', 38: 'kdf_salt', 39: 'kdf_iters'
};

function toHexDump(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(' ');
}

/** Pretty-prints a raw TagDrop CBOR sequence: hex dump, version/type envelope, and a
 *  key-by-key breakdown of the payload map annotated with KEY_NAMES. */
function describeCbor(bytes) {
  let out = bytes.length + ' bytes\n' + toHexDump(bytes) + '\n\n';
  try {
    const { items, trailing } = cborDecodeSequencePrefix(bytes, 3);
    if (items.length < 3) throw new Error('Expected version, type, payload — got ' + items.length + ' item(s)');
    const [version, type, payload] = items;
    out += 'version: ' + version + '\n';
    out += 'type: ' + type + ' (' + (TYPE_NAMES[type] || 'unknown') + ')\n\n';
    out += describeMap(payload, 0);
    if (trailing.length > 0) {
      const note = trailing.length >= OVERRIDE_BLOB_MIN_BYTES
        ? 'candidate encrypted override map, SPEC §9'
        : 'too short to be an override map, SPEC §9';
      out += '\ntrailing bytes: ' + toHexDump(trailing) + ' (' + trailing.length + ' bytes, ' + note + ')\n';
    }
  } catch (e) {
    out += 'Failed to decode as CBOR sequence: ' + e.message;
  }
  return out;
}

function describeMap(map, indent) {
  const pad = '  '.repeat(indent);
  let out = '';
  for (const key of Object.keys(map).map(Number).sort((a, b) => a - b)) {
    const value = map[key];
    const label = KEY_NAMES[key] ? key + ' (' + KEY_NAMES[key] + ')' : String(key);
    if (value instanceof Uint8Array) {
      out += pad + label + ': ' + toHexDump(value) + ' (' + value.length + ' bytes)\n';
    } else if (typeof value === 'string') {
      out += pad + label + ': "' + value + '"\n';
    } else if (Array.isArray(value)) {
      out += pad + label + ': [\n';
      for (const item of value) {
        if (item !== null && typeof item === 'object' && !(item instanceof Uint8Array) && !Array.isArray(item)) {
          out += pad + '  {\n' + describeMap(item, indent + 2) + pad + '  }\n';
        } else {
          out += pad + '  ' + item + '\n';
        }
      }
      out += pad + ']\n';
    } else {
      out += pad + label + ': ' + value + '\n';
    }
  }
  return out;
}

// ── TagDrop URI parser ────────────────────────────────────────────────────
async function parseUri(uri) {
  if (!uri.startsWith('tagdrop:')) return null;

  // Navigation link: tagdrop://ROOTHASH_B45[/slug] — disambiguated from encoding
  // URIs by the "//" (SPEC §2): a 2+ byte Base45 string can never start with "/".
  if (uri.startsWith('tagdrop://')) {
    const rest = uri.slice('tagdrop://'.length);
    const slash = rest.indexOf('/');
    const rhB45 = slash < 0 ? rest : rest.slice(0, slash);
    const slug  = slash < 0 ? null  : (rest.slice(slash + 1) || null);
    try {
      return { type: 'nav', rootHashHex: toHex(base45Decode(rhB45)), slug };
    } catch (e) {
      return { type: 'invalid' };
    }
  }

  // Encoding URI: tagdrop:<base45-cbor-sequence>
  let seq;
  try { seq = base45Decode(uri.slice('tagdrop:'.length)); }
  catch (e) { return { type: 'invalid' }; }

  let items, trailing;
  try { ({ items, trailing } = cborDecodeSequencePrefix(seq, 3)); }
  catch (e) { return { type: 'invalid' }; }
  if (items.length < 3) return { type: 'invalid' };
  const [version, kind, m] = items;
  if (version !== ENVELOPE_VERSION) return { type: 'invalid' };

  if (kind === TYPE_SINGLE) {
    const keyMaterial = m[K.KEY_MATERIAL] || null;
    const retainKey   = m[K.RETAIN_KEY] !== false;
    // Key-only code (SPEC §9): carries key_material for other content, no content/mime
    // of its own. Per "discovery, not declaration", nothing says which content it unlocks.
    if (keyMaterial && !m[K.CONTENT] && !m[K.MIME]) {
      return {
        type: 'key',
        cacheId: toHex(m[K.CACHE_ID]),
        hint:    m[K.HINT] || null,
        keyMaterial,
        retainKey,
        cbor: seq,
      };
    }
    // A Single's raw trailing bytes (after its 3-item CBOR sequence), if >= 28 bytes, are a
    // candidate hidden override-map blob (SPEC §9) — may carry real content+key together.
    return {
      type: 'single',
      cacheId:     toHex(m[K.CACHE_ID]),
      hint:        m[K.HINT]     || null,
      filename:    m[K.FILENAME] || null,
      mimeType:    m[K.MIME] || '',
      content:     m[K.CONTENT] || new Uint8Array(0),
      compression: m[K.COMPRESSION] || 0,
      encryption:  m[K.ENCRYPTION] || 0,
      overrideBlob: trailing.length >= OVERRIDE_BLOB_MIN_BYTES ? trailing : null,
      keyMaterial,
      retainKey,
      kdfAlg:   m[K.KDF_ALG]  || 0,
      kdfSalt:  m[K.KDF_SALT]  || null,
      kdfIters: m[K.KDF_ITERS] || 100000,
      cbor: seq,
    };
  }
  if (kind === TYPE_PAPER_MANIFEST) {
    return {
      type:     'paper',
      rootHash: toHex(m[K.CACHE_ID]),
      label:    m[K.HINT] || null,
      set:      m[K.SET]  || null,
      slug:     m[K.SLUG] || null,
      scannedAt: Date.now(),
      cbor: seq,
      keyMaterial: m[K.KEY_MATERIAL] || null,
      retainKey:   m[K.RETAIN_KEY] !== false,
      files: (m[K.FILES] || []).map(f => ({
        slug:     f[K.FILE_SLUG],
        mimeType: f[K.FILE_MIME],
        fileId:   toHex(f[K.FILE_ID]),
      })),
      related: (m[K.RELATED] || []).map(r => ({
        hint:    r[K.HINT],
        set:     r[K.SET]     || null,
        slug:    r[K.SLUG]    || null,
        paperId: r[K.PAPER_ID] ? toHex(r[K.PAPER_ID]) : null,
        lat:     r[K.LAT] ?? null,
        lng:     r[K.LNG] ?? null,
        keyMaterial: r[K.KEY_MATERIAL] || null,
        retainKey:   r[K.RETAIN_KEY] !== false,
      })),
    };
  }
  if (kind === TYPE_MANIFEST) {
    return {
      type:        'manifest',
      cacheId:     toHex(m[K.CACHE_ID]),
      hint:        m[K.HINT]     || null,
      filename:    m[K.FILENAME] || null,
      mimeType:    m[K.MIME],
      compression: m[K.COMPRESSION] || 0,
      chunkCount:  m[K.CHUNK_COUNT],
      sha256:      m[K.SHA256],
      encryption:  m[K.ENCRYPTION] || 0,
      keyMaterial: m[K.KEY_MATERIAL] || null,
      retainKey:   m[K.RETAIN_KEY] !== false,
      cbor: seq,
    };
  }
  if (kind === TYPE_CHUNK) {
    return {
      type:    'chunk',
      cacheId: toHex(m[K.CACHE_ID]),
      index:   m[K.CHUNK_IDX],
      data:    m[K.CHUNK_DATA],
      cbor: seq,
    };
  }
  return null;
}

// ── IndexedDB ─────────────────────────────────────────────────────────────
let _db;
async function getDb() {
  if (_db) return _db;
  return new Promise((res, rej) => {
    const req = indexedDB.open('tagdrop-reader', 2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('caches'))
        d.createObjectStore('caches', { keyPath: 'cacheId' });
      if (!d.objectStoreNames.contains('papers'))
        d.createObjectStore('papers', { keyPath: 'rootHash' });
      if (!d.objectStoreNames.contains('keys'))
        d.createObjectStore('keys', { keyPath: 'id' });
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function dbPut(store, val) {
  const d = await getDb();
  return new Promise((res, rej) => {
    const tx = d.transaction(store, 'readwrite');
    tx.objectStore(store).put(val).onsuccess = res;
    tx.onerror = () => rej(tx.error);
  });
}
async function dbGet(store, key) {
  const d = await getDb();
  return new Promise((res, rej) => {
    const tx = d.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbGetAll(store) {
  const d = await getDb();
  return new Promise((res, rej) => {
    const tx = d.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbClear() {
  const d = await getDb();
  await new Promise((res, rej) => {
    const tx = d.transaction(['caches', 'papers', 'keys'], 'readwrite');
    tx.objectStore('caches').clear();
    tx.objectStore('papers').clear();
    tx.objectStore('keys').clear();
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
  for (const id of Object.keys(awaitingManifests)) delete awaitingManifests[id];
}

// ── Chunk assembly ────────────────────────────────────────────────────────
// In-memory only — multi-code sets must be scanned in one session.
const assemblies = {};

// ── Assembled bytes awaiting a key (SPEC §9) ─────────────────────────────
// In-memory only, keyed by cacheId hex: hash-verified, fully-assembled chunk bytes
// that could not be decompressed as plain `content` per `compression` (SPEC §5
// step 5) — they must be a hidden override-map blob, but no retained key has
// authenticated it yet. Resolved by processDiscoveredKey when a matching key
// arrives ("discovery, not declaration" — scan order doesn't matter).
const awaitingManifests = {};

/**
 * Decompresses `clearContentBytes` per `compression` as the "cover" view, then — if
 * `overrideBlob` is present — tries every retained key against it as an encrypted
 * override map (SPEC §9). On a match, the override's fields overlay the cover and the
 * fully-resolved result is stored; otherwise the cover is stored with the blob kept as
 * `pendingOverrideBlob` for a later key to "self-correct". A Single always reaches
 * "Complete" — its `content` decompression doesn't depend on the override blob.
 */
async function resolveSingleAndStore(cacheId, clearContentBytes, overrideBlob, { compression, mimeType, hint, filename }, extraKeys = []) {
  const cover = compression === 1 ? await zlibDecompress(clearContentBytes) : clearContentBytes;
  if (overrideBlob) {
    const storedKeys = await dbGetAll('keys');
    for (const k of [...storedKeys, ...extraKeys]) {
      const override = await tryDecryptOverrideMap(overrideBlob, k.keyMaterial, compression);
      if (override) {
        const merged = mergeOverride({ hint, mimeType, filename, content: null }, override, new Uint8Array(0));
        await dbPut('caches', { cacheId, ...merged, pendingOverrideBlob: null, pendingCompression: 0 });
        return { content: merged.content, merged: true, fields: merged };
      }
    }
  }
  await dbPut('caches', {
    cacheId, mimeType, content: cover, hint, filename,
    pendingOverrideBlob: overrideBlob || null, pendingCompression: compression
  });
  return { content: cover, merged: false, fields: { hint, mimeType, filename } };
}

/**
 * Implements SPEC §5 step 5 for a Manifest+Chunks' assembled (hash-verified) bytes: if
 * `assembled` is long enough, tries every retained key against it as an encrypted
 * override map first. On a match, the override's fields overlay the manifest's clear
 * fields and the fully-resolved result is stored. Otherwise tries decompressing
 * `assembled` per `compression` as the "cover" content — `compression === 0` always
 * trivially succeeds (identity). On success, the cover is stored with `assembled` kept
 * as `pendingOverrideBlob` (if long enough) for a later key to self-correct. If neither
 * succeeds (real ciphertext, no matching key yet), stashes `assembled` in
 * `awaitingManifests` and returns null — SPEC §9 AwaitingKey.
 */
async function resolveAssembledAndStore(cacheId, assembled, manifestParsed) {
  const { compression, mimeType, hint, filename } = manifestParsed;
  if (assembled.length >= OVERRIDE_BLOB_MIN_BYTES) {
    for (const k of await dbGetAll('keys')) {
      const override = await tryDecryptOverrideMap(assembled, k.keyMaterial, compression);
      if (override) {
        const merged = mergeOverride({ hint, mimeType, filename, content: null }, override, new Uint8Array(0));
        await dbPut('caches', { cacheId, ...merged, pendingOverrideBlob: null, pendingCompression: 0 });
        return { content: merged.content, merged: true, fields: merged };
      }
    }
  }
  let cover;
  try {
    cover = compression === 1 ? await zlibDecompress(assembled) : assembled;
  } catch (e) {
    awaitingManifests[cacheId] = { assembled, manifest: manifestParsed };
    return null;
  }
  const pendingBlob = assembled.length >= OVERRIDE_BLOB_MIN_BYTES ? assembled : null;
  await dbPut('caches', {
    cacheId, mimeType, content: cover, hint, filename,
    pendingOverrideBlob: pendingBlob, pendingCompression: pendingBlob ? compression : 0
  });
  return { content: cover, merged: false, fields: { hint, mimeType, filename } };
}

/**
 * Tries `keyMaterial` against all currently-locked content: assemblies in `awaitingManifests`
 * and cached items with a `pendingOverrideBlob`. Returns true if anything was unlocked.
 * Does NOT store the key — callers decide whether and how to retain it.
 */
async function unlockWithKey(keyMaterial) {
  let unlockedAny = false;

  for (const [cacheId, entry] of Object.entries(awaitingManifests)) {
    const override = await tryDecryptOverrideMap(entry.assembled, keyMaterial, entry.manifest.compression);
    if (!override) continue;
    const { hint: h, mimeType, filename } = entry.manifest;
    const merged = mergeOverride({ hint: h, mimeType, filename, content: null }, override, new Uint8Array(0));
    await dbPut('caches', { cacheId, ...merged, pendingOverrideBlob: null, pendingCompression: 0 });
    delete awaitingManifests[cacheId];
    unlockedAny = true;
    showMsg('🔓 Unlocked: ' + (merged.filename || merged.hint || merged.mimeType), 'ok');
    await showContent(merged.mimeType, merged.content, merged.filename || merged.hint || merged.mimeType, cacheId);
  }

  for (const cached of await dbGetAll('caches')) {
    if (!cached.pendingOverrideBlob) continue;
    const override = await tryDecryptOverrideMap(cached.pendingOverrideBlob, keyMaterial, cached.pendingCompression);
    if (!override) continue;
    const merged = mergeOverride(cached, override, cached.content);
    await dbPut('caches', { ...cached, ...merged, pendingOverrideBlob: null, pendingCompression: 0 });
    unlockedAny = true;
    showMsg('🔓 Unlocked: ' + (merged.filename || merged.hint || merged.mimeType), 'ok');
  }

  if (activePaperHash) await renderPaper(activePaperHash);
  return unlockedAny;
}

/**
 * A `key_material` (SPEC §9) was just discovered — retain it (if recommended), then try
 * it against everything currently locked. "Discovery, not declaration": scan order between
 * a key and the content it unlocks doesn't matter.
 */
async function processDiscoveredKey(keyMaterial, retainKey, hint) {
  if (retainKey) {
    await dbPut('keys', { id: toHex(keyMaterial), keyMaterial, hint });
  }
  const unlockedAny = await unlockWithKey(keyMaterial);
  if (!unlockedAny) {
    showMsg('Key code scanned' + (retainKey ? ' and stored' : '') + ' — scan its content code to unlock.', 'info');
  }
}

// ── Camera / QR scanner ───────────────────────────────────────────────────
let scanning = false;
let scanRafId = null;

async function startScan() {
  if (scanning) return;
  const overlay = document.getElementById('scanOverlay');
  const video   = document.getElementById('video');
  overlay.classList.remove('hidden');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = stream;
    scanning = true;
    document.getElementById('scanStatus').textContent = 'Point camera at a TagDrop QR code.';
    tickScan(video, document.getElementById('canvas'), stream);
  } catch (e) {
    overlay.classList.add('hidden');
    showMsg('Camera error: ' + e.message, 'err');
  }
}

function stopScan(stream) {
  scanning = false;
  if (scanRafId) { cancelAnimationFrame(scanRafId); scanRafId = null; }
  if (stream) stream.getTracks().forEach(t => t.stop());
  document.getElementById('video').srcObject = null;
  document.getElementById('scanOverlay').classList.add('hidden');
}

function tickScan(video, canvas, stream) {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(video, 0, 0);
    const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      stopScan(stream);
      handleScanned(code.data);
      return;
    }
  }
  scanRafId = requestAnimationFrame(() => tickScan(video, canvas, stream));
}

// ── Main scan handler ─────────────────────────────────────────────────────
let activePaperHash = null;
let lastScannedCbor = null;
let lastScannedTitle = null;

function updateCborButton() {
  document.getElementById('btnCbor').disabled = !lastScannedCbor;
}

async function handleScanned(raw) {
  let parsed;
  try { parsed = await parseUri(raw); }
  catch (e) { showMsg('Parse error: ' + e.message, 'err'); return; }
  if (!parsed) { showMsg('Not a TagDrop QR code.', 'err'); return; }

  switch (parsed.type) {

    case 'single': {
      lastScannedCbor = parsed.cbor;
      lastScannedTitle = parsed.cacheId;
      updateCborButton();
      // SPEC §9: discover any carried key_material first, so a combined content+key code
      // can resolve its own overrideBlob below in one pass.
      if (parsed.keyMaterial) await processDiscoveredKey(parsed.keyMaterial, parsed.retainKey, parsed.hint);

      // If this code uses passphrase-based KDF (SPEC §9 kdf_params), check the session
      // cache so a previously-entered passphrase in this session is tried automatically.
      const saltHex = parsed.kdfAlg === 1 && parsed.kdfSalt ? toHex(parsed.kdfSalt) : null;
      const sessionKey = saltHex ? sessionPassphraseKeys.get(saltHex) : null;
      const extraKeys = sessionKey ? [{ keyMaterial: sessionKey }] : [];

      const { content, merged, fields } = await resolveSingleAndStore(parsed.cacheId, parsed.content, parsed.overrideBlob, parsed, extraKeys);
      const label = fields.filename || fields.hint || fields.mimeType;

      // Passphrase prompt: only if the code advertises KDF, has an override blob, and
      // no retained/session key has already unlocked it.
      if (!merged && parsed.overrideBlob && parsed.kdfAlg === 1 && saltHex) {
        const info = parsed.hint
          ? `"${parsed.hint}" is passphrase-protected. Enter the passphrase to unlock.`
          : 'This content is passphrase-protected. Enter the passphrase to unlock.';
        const result = await askPassphrase(info);
        if (result) {
          const derived = await deriveKeyFromPassphrase(result.passphrase, parsed.kdfSalt, parsed.kdfIters || 100000);
          const testOv = await tryDecryptOverrideMap(parsed.overrideBlob, derived, parsed.compression);
          if (!testOv) {
            document.getElementById('passphraseError').textContent = '';
            showMsg('Wrong passphrase — scan the code again to retry.', 'err');
          } else {
            if (result.sessionOnly) sessionPassphraseKeys.set(saltHex, derived);
            if (result.store) {
              await dbPut('keys', {
                id: toHex(derived), keyMaterial: derived,
                hint: 'passphrase (salt: ' + saltHex.slice(0, 8) + '…)',
              });
            }
            await unlockWithKey(derived);
            showMsg('🔓 Passphrase accepted — content unlocked!', 'ok');
          }
        } else {
          showMsg('Loaded: ' + label + ' (🔒 enter passphrase to unlock)', 'ok');
        }
      } else if (merged) {
        showMsg('🔓 Decrypted: ' + label, 'ok');
      } else if (parsed.overrideBlob) {
        showMsg('Loaded: ' + label + ' (🔒 hidden content not yet unlocked)', 'ok');
      } else {
        showMsg('Loaded: ' + label, 'ok');
      }

      await showContent(fields.mimeType, content, label, parsed.cacheId);
      // Refresh directory if this file belongs to the active paper
      if (activePaperHash) await renderPaper(activePaperHash);
      break;
    }

    case 'key':
      lastScannedCbor = parsed.cbor;
      lastScannedTitle = parsed.cacheId;
      updateCborButton();
      await processDiscoveredKey(parsed.keyMaterial, parsed.retainKey, parsed.hint);
      break;

    case 'paper':
      await dbPut('papers', parsed);
      activePaperHash = parsed.rootHash;
      lastScannedCbor = parsed.cbor;
      lastScannedTitle = parsed.rootHash;
      updateCborButton();
      // SPEC §9: a paper manifest (and its related[] entries) may each carry their own
      // key_material for other content discovered along the way.
      if (parsed.keyMaterial) await processDiscoveredKey(parsed.keyMaterial, parsed.retainKey, parsed.label);
      for (const related of parsed.related) {
        if (related.keyMaterial) await processDiscoveredKey(related.keyMaterial, related.retainKey, related.hint);
      }
      showMsg('Paper: ' + (parsed.label || 'untitled') + ' — ' + parsed.files.length + ' file(s)', 'ok');
      await renderPaper(parsed.rootHash);
      break;

    case 'manifest':
      if (parsed.keyMaterial) await processDiscoveredKey(parsed.keyMaterial, parsed.retainKey, parsed.hint);
      assemblies[parsed.cacheId] = { manifest: parsed, chunks: new Map() };
      lastScannedCbor = parsed.cbor;
      lastScannedTitle = parsed.cacheId;
      updateCborButton();
      showMsg('Manifest scanned — need ' + parsed.chunkCount + ' chunk(s). Scan them now.', 'info');
      showAssemblyProgress(parsed.cacheId, 0, parsed.chunkCount);
      break;

    case 'chunk': {
      const a = assemblies[parsed.cacheId];
      if (!a) {
        showMsg('Chunk received but no manifest yet — scan the manifest QR first.', 'warn');
        return;
      }
      lastScannedCbor = parsed.cbor;
      lastScannedTitle = parsed.cacheId + ' #' + parsed.index;
      updateCborButton();
      a.chunks.set(parsed.index, parsed.data);
      const got = a.chunks.size, need = a.manifest.chunkCount;
      if (got < need) {
        showMsg('Chunk ' + got + '/' + need + ' received.', 'info');
        showAssemblyProgress(parsed.cacheId, got, need);
        return;
      }
      // All chunks present — assemble in order
      const parts = [];
      for (let i = 0; i < need; i++) {
        const chunk = a.chunks.get(i);
        if (!chunk) { showMsg('Missing chunk ' + i + '. Scan it.', 'err'); return; }
        parts.push(chunk);
      }
      const raw = new Uint8Array(parts.reduce((s, c) => s + c.length, 0));
      let off = 0;
      for (const p of parts) { raw.set(p, off); off += p.length; }
      // SHA-256 integrity check (against the assembled bytes, matching Android ChunkAssembler)
      const hashBuf  = await crypto.subtle.digest('SHA-256', raw);
      const hashBytes = new Uint8Array(hashBuf);
      const expected  = a.manifest.sha256;
      let ok = expected && hashBytes.length === expected.length;
      if (ok) for (let i = 0; i < hashBytes.length; i++) if (hashBytes[i] !== expected[i]) { ok = false; break; }
      if (!ok) { showMsg('Integrity check failed — try rescanning all chunks.', 'err'); return; }
      const manifest = a.manifest;
      delete assemblies[manifest.cacheId];
      hideAssemblyProgress();
      // SPEC §5 step 5 / §9: try the assembled bytes as a hidden override-map blob first,
      // then as plain content per `compression` — may still end up AwaitingKey.
      const result = await resolveAssembledAndStore(manifest.cacheId, raw, manifest);
      if (result === null) {
        showMsg('🔒 All chunks assembled, but still locked — scan the key code to unlock.', 'info');
        if (activePaperHash) await renderPaper(activePaperHash);
        break;
      }
      const { content, merged, fields } = result;
      const label = fields.filename || fields.hint || fields.mimeType;
      showMsg(merged ? '🔓 All chunks assembled and decrypted!' : 'All chunks assembled!', 'ok');
      await showContent(fields.mimeType, content, label, manifest.cacheId);
      if (activePaperHash) await renderPaper(activePaperHash);
      break;
    }

    case 'nav':
      await resolveNavLink(parsed.rootHashHex, parsed.slug);
      break;

    case 'invalid':
      showMsg('Invalid tagdrop:// link.', 'err');
      break;

    default:
      showMsg('Unrecognised QR content.', 'err');
  }
}

// ── Navigation link resolution ────────────────────────────────────────────
async function resolveNavLink(rootHashHex, slug) {
  const paper = await dbGet('papers', rootHashHex);
  if (!paper) {
    showMsg('Paper not in collection — scan its manifest QR first.', 'warn');
    return;
  }
  if (!slug) {
    activePaperHash = rootHashHex;
    await renderPaper(rootHashHex);
    return;
  }
  const fileEntry = paper.files.find(f => f.slug === slug);
  if (!fileEntry) {
    showMsg("File '" + slug + "' not in this paper's directory.", 'err');
    return;
  }
  const cached = await dbGet('caches', fileEntry.fileId);
  if (!cached) {
    showMsg("File '" + slug + "' not yet scanned — find and scan its QR.", 'warn');
    return;
  }
  await showContent(cached.mimeType, cached.content, slug, fileEntry.fileId);
}

// ── Paper directory ───────────────────────────────────────────────────────
// Slugs treated as a paper's homepage/landing page (see renderPaper below).
const HOME_SLUGS = ['index', 'index.html', 'index.md'];

async function renderPaper(rootHash) {
  const paper = await dbGet('papers', rootHash);
  if (!paper) return;

  // Which files are already cached?
  const allCaches = await dbGetAll('caches');
  const cacheById = new Map(allCaches.map(c => [c.cacheId, c]));

  // Build header
  let hdr = '<strong>' + escHtml(paper.label || 'Untitled Paper') + '</strong>';
  if (paper.set)  hdr += ' <span class="chip">' + escHtml(paper.set) + '</span>';
  if (paper.slug) hdr += ' <span class="chip">/' + escHtml(paper.slug) + '</span>';

  // Homepage convention: a file with slug "index", "index.html", or "index.md" is this
  // paper's landing page — surfaced as a primary "Open" action once cached (mirrors the
  // style.css stylesheet convention; pure naming convention, no SPEC.md change needed).
  const homeFile  = paper.files.find(f => HOME_SLUGS.includes(f.slug));
  const homeCache = homeFile && cacheById.get(homeFile.fileId);
  if (homeCache) {
    hdr += ' <button class="secondary open-home" data-id="' + escHtml(homeFile.fileId) +
      '" data-slug="' + escHtml(homeFile.slug) + '">🏠 Open homepage</button>';
  }
  document.getElementById('paperHeader').innerHTML = hdr;

  const list = document.getElementById('fileList');
  list.innerHTML = '';
  for (const f of paper.files) {
    const cache = cacheById.get(f.fileId);
    const li   = document.createElement('li');
    li.className = 'file-item ' + (cache ? 'have' : 'missing');
    if (cache) {
      // SPEC §9: a pending override blob means this file's cover content is shown but a
      // later key could "self-correct" hint/filename/mime_type/content.
      const lock = cache.pendingOverrideBlob ? ' 🔒' : '';
      const home = HOME_SLUGS.includes(f.slug) ? ' 🏠' : '';
      li.innerHTML =
        '<span class="slug">' + escHtml(f.slug) + lock + home + '</span>' +
        '<span class="mime">' + escHtml(f.mimeType) + '</span>' +
        '<button class="secondary open-file" data-id="' + escHtml(f.fileId) + '" data-slug="' + escHtml(f.slug) + '">Open</button>';
    } else {
      const label = awaitingManifests[f.fileId] ? '🔒 needs key' : 'not scanned';
      li.innerHTML =
        '<span class="slug">' + escHtml(f.slug) + '</span>' +
        '<span class="mime">' + escHtml(f.mimeType) + '</span>' +
        '<span class="missing-label">' + label + '</span>';
    }
    list.appendChild(li);
  }

  document.getElementById('paperSection').classList.remove('hidden');
  document.getElementById('contentSection').classList.add('hidden');
}

// ── Markdown rendering ────────────────────────────────────────────────────
// Dynamically imported on first use (same pattern as the generator's qrcode import).
let markedModulePromise;
function loadMarked() {
  if (!markedModulePromise) markedModulePromise = import('https://cdn.jsdelivr.net/npm/marked@18.0.5/+esm');
  return markedModulePromise;
}

// Finds the paper (if any) that lists fileId in its files, returning {paper, slug} or
// null — mirrors TagDropLinkResolver.findPaperContext on the Android side.
async function findPaperContext(fileId) {
  for (const paper of await dbGetAll('papers')) {
    const file = paper.files.find(f => f.fileId === fileId);
    if (file) return { paper, slug: file.slug };
  }
  return null;
}

// Looks up the paper-wide stylesheet sibling (SPEC §7 convention: a file with slug
// "style.css" and mimeType "text/css"), returning its cached text content, or null.
async function findStylesheet(paper) {
  const cssFile = paper.files.find(f => f.slug === 'style.css' && f.mimeType === 'text/css');
  if (!cssFile) return null;
  const cached = await dbGet('caches', cssFile.fileId);
  return cached ? new TextDecoder().decode(cached.content) : null;
}

// ── Content rendering ─────────────────────────────────────────────────────
// Renders an HTML document in a sandboxed iframe, with a postMessage relay for
// tagdrop:// link clicks. sandbox="allow-scripts" (no allow-same-origin) so the
// iframe cannot access parent storage or DOM — only postMessage works cross-sandbox.
function renderHtmlInIframe(area, html) {
  const relay =
    `<script>document.addEventListener('click',function(e){` +
    `var a=e.target.closest('a');` +
    `if(a&&a.href.startsWith('tagdrop://')){` +
    `e.preventDefault();window.parent.postMessage({type:'tagdrop-nav',uri:a.href},'*');}` +
    `});<\/script>`;
  html = html.includes('</head>') ? html.replace('</head>', relay + '</head>') : relay + html;
  const frame = document.createElement('iframe');
  frame.sandbox  = 'allow-scripts';
  frame.srcdoc   = html;
  frame.style.cssText = 'width:100%;height:75vh;border:none;display:block;background:#fff;';
  area.appendChild(frame);
}

async function showContent(mimeType, content, title, cacheId) {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  document.getElementById('contentTitle').textContent = title;

  if (mimeType.startsWith('text/html')) {
    renderHtmlInIframe(area, new TextDecoder().decode(content));
  } else if (mimeType.startsWith('text/markdown')) {
    const markdownText = new TextDecoder().decode(content);
    let body;
    try {
      const { marked } = await loadMarked();
      body = marked.parse(markdownText);
    } catch (e) {
      showMsg('Markdown renderer failed to load (offline?) — showing raw text.', 'warn');
      const pre = document.createElement('pre');
      pre.style.cssText = 'padding:16px;margin:0;white-space:pre-wrap;word-break:break-word;';
      pre.textContent = markdownText;
      area.appendChild(pre);
      document.getElementById('contentSection').classList.remove('hidden');
      return;
    }
    let css = null;
    if (cacheId) {
      const ctx = await findPaperContext(cacheId);
      if (ctx) css = await findStylesheet(ctx.paper);
    }
    const style = css ? '<style>' + css + '</style>' : '';
    const html = '<!DOCTYPE html><html><head><meta charset="utf-8">' + style + '</head><body>' + body + '</body></html>';
    renderHtmlInIframe(area, html);
  } else if (mimeType.startsWith('text/')) {
    const pre = document.createElement('pre');
    pre.style.cssText = 'padding:16px;margin:0;white-space:pre-wrap;word-break:break-word;';
    pre.textContent = new TextDecoder().decode(content);
    area.appendChild(pre);
  } else if (mimeType.startsWith('image/')) {
    const blob = new Blob([content], { type: mimeType });
    const img  = document.createElement('img');
    img.src = URL.createObjectURL(blob);
    img.style.cssText = 'max-width:100%;display:block;margin:16px auto;';
    area.appendChild(img);
  } else if (mimeType.startsWith('audio/')) {
    const blob  = new Blob([content], { type: mimeType });
    const audio = document.createElement('audio');
    audio.src      = URL.createObjectURL(blob);
    audio.controls = true;
    audio.style.cssText = 'width:100%;padding:20px 16px;display:block;';
    area.appendChild(audio);
  } else {
    // Unknown type — offer download
    const blob = new Blob([content], { type: mimeType });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = title || 'tagdrop-file';
    a.style.cssText = 'display:block;padding:24px 16px;';
    a.textContent = 'Download ' + mimeType;
    area.appendChild(a);
  }

  document.getElementById('contentSection').classList.remove('hidden');
}

// ── postMessage from sandboxed iframe ─────────────────────────────────────
window.addEventListener('message', async e => {
  if (!e.data || e.data.type !== 'tagdrop-nav') return;
  let parsed;
  try { parsed = await parseUri(e.data.uri); } catch (err) { return; }
  if (parsed && parsed.type === 'nav') await resolveNavLink(parsed.rootHashHex, parsed.slug);
});

// ── Assembly progress bar ─────────────────────────────────────────────────
function showAssemblyProgress(cacheId, got, need) {
  document.getElementById('assemblyText').textContent = 'Multi-code: ' + got + '/' + need + ' chunks';
  document.getElementById('btnScanChunk').onclick = startScan;
  document.getElementById('assemblyBar').classList.remove('hidden');
}
function hideAssemblyProgress() {
  document.getElementById('assemblyBar').classList.add('hidden');
}

// ── Status message ────────────────────────────────────────────────────────
let msgTimer;
function showMsg(text, type) {
  const bar = document.getElementById('msgBar');
  bar.textContent = text;
  bar.className = type || '';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => bar.classList.add('hidden'), 5000);
}

// ── Event wiring ──────────────────────────────────────────────────────────
document.getElementById('btnScan').onclick = startScan;
document.getElementById('btnScanFile').onclick = startScan;

// ── Image file / drag-and-drop QR decode ─────────────────────────────────
async function decodeQrFromFile(file) {
  const showErr = msg => {
    const bar = document.getElementById('msgBar');
    bar.textContent = msg;
    bar.className = 'err';
    bar.classList.remove('hidden');
  };
  let bitmap;
  try { bitmap = await createImageBitmap(file); }
  catch (e) { showErr('Could not load image — is it a valid PNG or JPEG?'); return; }
  const offscreen = document.createElement('canvas');
  offscreen.width  = bitmap.width;
  offscreen.height = bitmap.height;
  const ctx = offscreen.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(bitmap, 0, 0);
  const imgData = ctx.getImageData(0, 0, offscreen.width, offscreen.height);
  const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
  if (!code) {
    showErr('No QR code found in this image — try a higher-resolution version or check that the code scanned correctly.');
    return;
  }
  await handleScanned(code.data);
}

(function () {
  const zone  = document.getElementById('imgDropZone');
  const input = document.getElementById('imgFileInput');

  input.addEventListener('change', e => {
    if (e.target.files[0]) decodeQrFromFile(e.target.files[0]);
    e.target.value = '';
  });

  zone.addEventListener('click', () => input.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer?.files[0];
    if (file) decodeQrFromFile(file);
  });
})();

// Clipboard paste — works where tab-to-tab drag doesn't (browser security blocks it).
document.addEventListener('paste', e => {
  const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (!item) return;
  e.preventDefault();
  const file = item.getAsFile();
  if (file) decodeQrFromFile(file);
});

document.getElementById('btnStopScan').onclick = () => {
  const v = document.getElementById('video');
  stopScan(v.srcObject);
};

document.getElementById('btnBack').onclick = async () => {
  document.getElementById('contentSection').classList.add('hidden');
  if (activePaperHash) await renderPaper(activePaperHash);
};

document.getElementById('fileList').addEventListener('click', async e => {
  const btn = e.target.closest('.open-file');
  if (!btn) return;
  const cached = await dbGet('caches', btn.dataset.id);
  if (cached) await showContent(cached.mimeType, cached.content, btn.dataset.slug, btn.dataset.id);
  else showMsg('Not cached yet — scan its QR code.', 'warn');
});

document.getElementById('paperHeader').addEventListener('click', async e => {
  const btn = e.target.closest('.open-home');
  if (!btn) return;
  const cached = await dbGet('caches', btn.dataset.id);
  if (cached) await showContent(cached.mimeType, cached.content, btn.dataset.slug, btn.dataset.id);
});

document.getElementById('btnCbor').onclick = () => {
  if (!lastScannedCbor) return;
  document.getElementById('cborTitle').textContent = 'Raw CBOR — ' + lastScannedTitle;
  document.getElementById('cborDump').textContent = describeCbor(lastScannedCbor);
  document.getElementById('cborOverlay').classList.remove('hidden');
};

document.getElementById('btnCloseCbor').onclick = () => {
  document.getElementById('cborOverlay').classList.add('hidden');
};

document.getElementById('btnClear').onclick = async () => {
  if (!confirm('Clear all cached TagDrop content from this browser?')) return;
  await dbClear();
  activePaperHash = null;
  document.getElementById('paperSection').classList.add('hidden');
  document.getElementById('contentSection').classList.add('hidden');
  showMsg('Cache cleared.', 'ok');
};

// ── Restore on load ───────────────────────────────────────────────────────
(async () => {
  const papers = await dbGetAll('papers');
  if (papers.length === 0) return;
  // Show the most recently scanned paper
  const latest = papers.reduce((a, b) => ((b.scannedAt || 0) > (a.scannedAt || 0) ? b : a));
  activePaperHash = latest.rootHash;
  if (latest.cbor) {
    lastScannedCbor = latest.cbor;
    lastScannedTitle = latest.rootHash;
    updateCborButton();
  }
  await renderPaper(latest.rootHash);
})();
</script>
